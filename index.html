<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#051a0b"/>
<title>Thartheel — Grand Quran Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #d4af37;
  --gold-light: #f5d06a;
  --green-deep: #051a0b;
  --green-mid: #0f3d1a;
  --green-bright: #1a5c2a;
  --text-main: #f0ede3;
  --text-muted: #a8c9a0;
  --text-gold: #e8c96a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--green-deep);
  min-height: 100vh;
  font-family: 'Amiri', Georgia, serif;
  color: var(--text-main);
  overflow-x: hidden;
}
.bg-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 90% 55% at 50% 0%, rgba(26,92,42,0.6) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 85% 90%, rgba(15,61,26,0.35) 0%, transparent 55%),
    var(--green-deep);
}
.stars-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.star {
  position: absolute; border-radius: 50%; background: rgba(255,215,0,0.8);
  animation: twinkle var(--dur,3s) var(--delay,0s) infinite ease-in-out;
}
@keyframes twinkle {
  0%,100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.6); }
}
.page {
  position: relative; z-index: 1;
  max-width: 430px; margin: 0 auto;
  padding: 0 0 56px;
}

/* HEADER */
.header {
  text-align: center;
  padding: 48px 20px 0;
  position: relative;
}
.crescent-wrap {
  position: absolute; top: 18px; right: 18px;
  width: 48px; height: 48px;
  opacity: 0.2; animation: spin 28s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.org-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(212,175,55,0.1);
  border: 1px solid rgba(212,175,55,0.32);
  color: var(--gold-light);
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  padding: 6px 18px; border-radius: 30px;
  font-family: 'Cinzel', serif;
  margin-bottom: 22px;
}
.org-badge::before, .org-badge::after { content: '✦'; font-size: 7px; opacity: 0.55; }

.arabic-title {
  font-family: 'Noto Kufi Arabic', serif;
  font-size: clamp(58px, 20vw, 80px);
  font-weight: 700;
  color: var(--gold-light);
  line-height: 1;
  display: block;
  margin-bottom: 6px;
  animation: auraPulse 4s ease-in-out infinite;
}
@keyframes auraPulse {
  0%,100% { text-shadow: 0 0 30px rgba(245,208,106,0.12); }
  50% { text-shadow: 0 0 55px rgba(245,208,106,0.5), 0 0 90px rgba(245,208,106,0.12); }
}
.latin-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(11px, 3.2vw, 13px);
  letter-spacing: 5px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 22px;
}
.chips {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 8px; padding: 0 12px; margin-bottom: 28px;
}
.chip {
  background: rgba(255,255,255,0.055);
  border: 0.5px solid rgba(212,175,55,0.28);
  color: var(--text-gold);
  font-size: 11.5px; padding: 7px 14px;
  border-radius: 30px;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.5px; white-space: nowrap;
}
.chip.hot {
  background: rgba(212,175,55,0.13);
  border-color: rgba(212,175,55,0.5);
  color: var(--gold-light);
}

/* DIVIDER */
.ornament {
  display: flex; align-items: center; gap: 10px;
  padding: 0 28px; margin-bottom: 22px;
}
.orn-line { flex:1; height:1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent); }
.orn-dot { color: var(--gold); font-size: 13px; opacity: 0.65; }

/* PRIZES */
.prizes {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 8px; padding: 0 18px; margin-bottom: 26px;
}
.prize-card {
  background: rgba(212,175,55,0.06);
  border: 0.5px solid rgba(212,175,55,0.22);
  border-radius: 16px; padding: 14px 6px;
  text-align: center; position: relative; overflow: hidden;
}
.prize-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
}
.prize-card.g::before { background: linear-gradient(90deg,transparent,#d4af37,transparent); }
.prize-card.s::before { background: linear-gradient(90deg,transparent,#c0c0c0,transparent); }
.prize-card.b::before { background: linear-gradient(90deg,transparent,#cd7f32,transparent); }
.prize-rank { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); font-family:'Cinzel',serif; margin-bottom: 4px; }
.prize-amount { font-size: clamp(20px,5.5vw,26px); font-weight: 700; font-family:'Cinzel',serif; line-height:1; margin-bottom:3px; }
.prize-card.g .prize-amount { color:#d4af37; }
.prize-card.s .prize-amount { color:#c8c8c8; }
.prize-card.b .prize-amount { color:#cd7f32; }
.prize-label { font-size:9px; color: var(--text-muted); letter-spacing:1px; font-family:'Cinzel',serif; }

/* FORM */
.form-card {
  background: rgba(255,255,255,0.042);
  border: 0.5px solid rgba(212,175,55,0.18);
  border-radius: 22px;
  margin: 0 14px;
  padding: 26px 20px 22px;
}
.form-section-label {
  font-family:'Cinzel',serif; font-size:9px; letter-spacing:3.5px;
  text-transform:uppercase; color: var(--gold); opacity:0.65;
  margin-bottom:18px; padding-bottom:10px;
  border-bottom: 0.5px solid rgba(212,175,55,0.13);
}
.field { margin-bottom: 15px; }
.field label {
  display:block; font-size:10.5px; letter-spacing:1.5px;
  text-transform:uppercase; color: var(--text-muted);
  margin-bottom:8px; font-family:'Cinzel',serif;
}
.field input, .field select {
  width:100%; padding: 15px 16px;
  background: rgba(255,255,255,0.058);
  border: 1px solid rgba(212,175,55,0.18);
  border-radius: 13px;
  color: var(--text-main);
  font-size: 16px; /* prevents iOS auto-zoom */
  font-family: 'Amiri', Georgia, serif;
  outline: none;
  transition: border-color 0.22s, background 0.22s, box-shadow 0.22s;
  -webkit-appearance: none; appearance: none;
}
.field input::placeholder { color: rgba(200,190,160,0.32); font-size:14px; }
.field input:focus, .field select:focus {
  border-color: rgba(212,175,55,0.58);
  background: rgba(255,255,255,0.085);
  box-shadow: 0 0 0 3px rgba(212,175,55,0.07);
}
.sel-wrap { position:relative; }
.sel-wrap::after {
  content:'▾'; position:absolute; right:15px; top:50%; transform:translateY(-50%);
  color: var(--gold); opacity:0.55; pointer-events:none; font-size:14px;
}
.field select option { background: #0a2910; color: var(--text-main); }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* SUBMIT */
.submit-btn {
  width:100%; padding:17px;
  margin-top:6px;
  background: linear-gradient(135deg, #d4af37 0%, #906400 100%);
  border:none; border-radius:14px;
  color:#140c00; font-size:15px; font-weight:600;
  font-family:'Cinzel',serif; letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; position:relative; overflow:hidden;
  transition: transform 0.18s, box-shadow 0.18s;
  -webkit-appearance:none;
}
.submit-btn:active { transform:scale(0.97); }
.submit-btn::before {
  content:''; position:absolute;
  top:0; left:-80%; width:55%; height:100%;
  background:rgba(255,255,255,0.2); transform:skewX(-20deg);
  animation: shine 3.5s 0.8s infinite;
}
@keyframes shine { 0%{left:-80%} 55%,100%{left:130%} }

/* SUCCESS */
.success-screen { display:none; text-align:center; padding:36px 16px; }
.success-icon {
  font-size:60px; color:var(--gold-light); display:block;
  margin-bottom:18px;
  animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.success-title {
  font-family:'Cinzel',serif; font-size:22px;
  color:var(--gold-light); margin-bottom:12px; letter-spacing:1px;
}
.success-sub { font-size:15px; color:var(--text-muted); line-height:1.8; }
.success-sub strong { color:var(--text-gold); }

/* ERROR highlight */
.field input.err, .field select.err {
  border-color: rgba(220,70,50,0.55);
  background: rgba(220,70,50,0.05);
}

/* FOOTER */
.footer {
  text-align:center; margin-top:26px; padding:0 16px;
  font-family:'Cinzel',serif; font-size:9.5px; letter-spacing:2.5px;
  text-transform:uppercase; color:rgba(200,230,195,0.28);
}
.footer-dot { color:var(--gold); opacity:0.35; margin:0 8px; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="stars-layer" id="starsLayer"></div>

<div class="page">

  <div class="header">
    <svg class="crescent-wrap" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="42" fill="#d4af37"/>
      <circle cx="68" cy="37" r="35" fill="#051a0b"/>
    </svg>

    <div class="latin-title">Thartheel</div>

    <div class="chips">
      <span class="chip hot">28 April 2026</span>
      <span class="chip">9 : 00 PM</span>
      <span class="chip hot">Grand Quran Quiz</span>
    </div>
  </div>

  <div class="form-card">
    <div id="formWrap">
      <div class="form-section-label">Registration</div>
      <form id="regForm" novalidate>

        <div class="field">
          <label for="fname">Full Name</label>
          <input id="fname" type="text" placeholder="Your full name" autocomplete="name" inputmode="text"/>
        </div>

        <div class="field">
          <label for="college">College</label>
          <input id="college" type="text" placeholder="Name of your college" autocomplete="organization"/>
        </div>

        <div class="field">
          <label for="course">Course</label>
          <input id="course" type="text" placeholder="e.g. B.Sc Computer Science"/>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="year">Year</label>
            <div class="sel-wrap">
              <select id="year">
                <option value="" disabled selected>Year</option>
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
                <option>4th Year</option>
                <option>PG 1st Year</option>
                <option>PG 2nd Year</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="district">District</label>
            <div class="sel-wrap">
              <select id="district">
                <option value="" disabled selected>District</option>
                <option>Thiruvananthapuram</option>
                <option>Kollam</option>
                <option>Pathanamthitta</option>
                <option>Alappuzha</option>
                <option>Kottayam</option>
                <option>Idukki</option>
                <option>Ernakulam</option>
                <option>Thrissur</option>
                <option>Palakkad</option>
                <option>Malappuram East</option>
                <option>Malappuram West</option>
                <option>Kozhikode North</option>
                <option>Kozhikode South</option>
                <option>Wayanad</option>
                <option>Kannur</option>
                <option>Kasaragod</option>
                <option>Nilgiris</option>
              </select>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="phone">Phone Number</label>
          <input id="phone" type="tel" placeholder="+91 00000 00000" autocomplete="tel" inputmode="tel"/>
        </div>

        <button type="button" onclick="handleSubmit()" class="submit-btn">Register ✦</button>
      </form>
    </div>

    <div class="success-screen" id="successScreen">
      <span class="success-icon">✦</span>
      <div class="success-title" id="successTitle">Registered!</div>
      <div class="success-sub">
        Jazakallah Khair.<br>
        You're all set for Thartheel 2026.<br><br>
        See you on <strong>28 April at 9:00 PM</strong>.
      </div>
    </div>
  </div>

  <div class="footer">
    <span>Kerala Campus Syndicate</span>
  </div>

</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDF9sf1KGPFhxb7yEmgNOwLfZM5AcPdu0wrt_s9eqnxs10DN_llL3BWupsxvWSzMNf/exec';
  /* Stars */
  const layer = document.getElementById('starsLayer');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = (Math.random() * 2.2 + 0.7).toFixed(1);
    s.style.cssText = [
      `width:${sz}px`, `height:${sz}px`,
      `top:${(Math.random()*100).toFixed(1)}%`,
      `left:${(Math.random()*100).toFixed(1)}%`,
      `--delay:${(Math.random()*4.5).toFixed(2)}s`,
      `--dur:${(2+Math.random()*3.5).toFixed(2)}s`
    ].join(';');
    layer.appendChild(s);
  }

  /* Clear error on interaction */
  document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', () => el.classList.remove('err'));
    el.addEventListener('change', () => el.classList.remove('err'));
  });

  /* Submit */
  async function handleSubmit() {
    const fields = [
      document.getElementById('fname'),
      document.getElementById('college'),
      document.getElementById('course'),
      document.getElementById('year'),
      document.getElementById('district'),
      document.getElementById('phone'),
    ];

    let firstErr = null;
    fields.forEach(el => {
      if (!el.value.trim()) {
        el.classList.add('err');
        if (!firstErr) firstErr = el;
      }
    });

    if (firstErr) {
      firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      firstErr.focus();
      return;
    }

    // Disable submit button to prevent double submission
    const submitBtn = event.target;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    // Prepare data for Google Sheets
    const formData = {
      fullName: fields[0].value.trim(),
      college: fields[1].value.trim(),
      course: fields[2].value.trim(),
      year: fields[3].value.trim(),
      district: fields[4].value.trim(),
      phone: fields[5].value.trim()
    };

    try {
      // Send data to Google Apps Script (if URL is configured)
      if (APPS_SCRIPT_URL && APPS_SCRIPT_URL.trim() !== '') {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', // Required for Apps Script
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(formData)
        });
        // Note: With no-cors mode, we can't read the response
        // But if no error is thrown, we assume success
      } else {
        console.warn('APPS_SCRIPT_URL not configured. Form data not saved to Google Sheets.');
      }
      
      // Show success screen
      const name = fields[0].value.trim().split(' ')[0];
      document.getElementById('formWrap').style.display = 'none';
      const ss = document.getElementById('successScreen');
      ss.style.display = 'block';
      document.getElementById('successTitle').textContent = `Ahlan, ${name}!`;
      ss.scrollIntoView({ behavior: 'smooth', block: 'center' });

    } catch (error) {
      console.error('Error submitting form:', error);
      alert('There was an error submitting your registration. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Register ✦';
    }
  }
</script>
</body>
</html>
