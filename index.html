<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Cypher - Treasure Hunt Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated treasure elements */
        .treasure-coin {
            position: fixed;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ffd700 0%, #ffed4e 50%, #d4af37 100%);
            border-radius: 50%;
            border: 3px solid #b8860b;
            animation: float 4s ease-in-out infinite;
            z-index: 1;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .treasure-coin:nth-child(1) {
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }

        .treasure-coin:nth-child(2) {
            top: 60%;
            right: 15%;
            animation-delay: 1s;
        }

        .compass {
            position: fixed;
            width: 60px;
            height: 60px;
            top: 25%;
            right: 8%;
            animation: rotate 8s linear infinite;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(255, 99, 71, 0.6));
        }

        .map-scroll {
            position: fixed;
            width: 70px;
            height: 50px;
            bottom: 20%;
            left: 8%;
            animation: bounce 3s ease-in-out infinite;
            z-index: 1;
            filter: drop-shadow(0 0 10px rgba(222, 184, 135, 0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.1); }
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        .form-wrapper {
            background: rgba(20, 25, 45, 0.95);
            border: 3px solid #d4af37;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3),
                        inset 0 0 60px rgba(0, 0, 0, 0.5);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .form-wrapper::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, #d4af37, #ffd700, #d4af37);
            border-radius: 15px;
            z-index: -1;
            opacity: 0.3;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
                         0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .header h2 {
            font-size: 1.3em;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
        }

        .header p {
            color: #a0aec0;
            font-size: 1em;
            font-style: italic;
        }

        .script-url-section {
            background: rgba(26, 31, 58, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #d4af37;
        }

        .script-url-section input {
            margin-top: 10px;
        }

        .script-url-section small {
            color: #a0aec0;
            display: block;
            margin-top: 5px;
        }

        .script-url-section {
            background: rgba(26, 31, 58, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #d4af37;
        }

        .script-url-section input {
            margin-top: 10px;
        }

        .script-url-section small {
            color: #a0aec0;
            display: block;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 1.1em;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .required {
            color: #ff6347;
        }

        input[type="text"],
        input[type="tel"],
        input[type="url"],
        select {
            width: 100%;
            padding: 12px;
            background: rgba(10, 14, 39, 0.7);
            border: 2px solid #4a5568;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        select {
            cursor: pointer;
        }

        select option {
            background: #0a0e27;
            color: #fff;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .radio-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ffd700;
        }

        .radio-label {
            color: #fff;
            font-size: 1em;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #d4af37 0%, #ffd700 50%, #d4af37 100%);
            border: none;
            border-radius: 10px;
            color: #0a0e27;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            font-family: 'Courier New', monospace;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .team-section {
            background: rgba(26, 31, 58, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #d4af37;
            display: none;
        }

        .team-section.active {
            display: block;
        }

        .section-title {
            color: #ffd700;
            font-size: 1.2em;
            margin-bottom: 15px;
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #d4af37;
            font-size: 0.9em;
            border-top: 2px solid rgba(212, 175, 55, 0.3);
        }

        .profsummit-notice {
            background: rgba(255, 99, 71, 0.1);
            border: 2px solid #000000;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            color: #fff;
            text-align: center;
            display: none;
        }

        .profsummit-notice.active {
            display: block;
        }

        .profsummit-notice a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }

        .profsummit-notice a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .header h2 {
                font-size: 1.1em;
            }

            .radio-group {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated treasure elements -->
    <div class="treasure-coin"></div>
    <div class="treasure-coin"></div>
    
    <svg class="compass" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="#8b4513" stroke="#d4af37" stroke-width="3"/>
        <circle cx="50" cy="50" r="35" fill="#2c1810" stroke="#d4af37" stroke-width="2"/>
        <polygon points="50,15 55,48 50,50 45,48" fill="#ff6347"/>
        <polygon points="50,85 55,52 50,50 45,52" fill="#fff"/>
        <text x="50" y="25" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">N</text>
    </svg>

    <svg class="map-scroll" viewBox="0 0 100 100">
        <rect x="10" y="20" width="80" height="60" fill="#deb887" rx="5"/>
        <line x1="20" y1="35" x2="80" y2="35" stroke="#8b4513" stroke-width="2"/>
        <line x1="20" y1="45" x2="80" y2="45" stroke="#8b4513" stroke-width="2"/>
        <line x1="20" y1="55" x2="60" y2="55" stroke="#8b4513" stroke-width="2"/>
        <circle cx="70" cy="60" r="8" fill="none" stroke="#ff6347" stroke-width="3"/>
        <line x1="64" y1="54" x2="76" y2="66" stroke="#ff6347" stroke-width="3"/>
    </svg>

    <div class="container">
        <div class="form-wrapper">
            <div class="header">
                <h1>⚔️ OPERATION CYPHER ⚔️</h1>
                <h2>State Level Treasure Hunt</h2>
                <p>Solve clues and uncover secrets across the venue</p>
            </div>

            <form id="registrationForm">
                <div class="form-group">
                    <label for="college">College <span class="required">*</span></label>
                    <input type="text" id="college" name="college" required>
                </div>

                <div class="form-group">
                    <label>Participation Type <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="solo" name="participationType" value="solo" required>
                            <label for="solo" class="radio-label">Solo</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="team" name="participationType" value="team" required>
                            <label for="team" class="radio-label">Team</label>
                        </div>
                    </div>
                </div>

                <!-- Solo Section -->
                <div class="team-section" id="soloSection">
                    <div class="section-title">👤 Solo Participant</div>
                    <div class="form-group">
                        <label for="soloName">Name <span class="required">*</span></label>
                        <input type="text" id="soloName" name="soloName">
                    </div>

                    <div class="form-group">
                        <label for="soloPhone">Phone Number <span class="required">*</span></label>
                        <input type="tel" id="soloPhone" name="soloPhone">
                    </div>
                </div>

                <!-- Team Section -->
                <div class="team-section" id="teamSection">
                    <div class="section-title">👥 Team Details</div>
                    
                    <div class="form-group">
                        <label for="teamLeadName">Team Lead Name <span class="required">*</span></label>
                        <input type="text" id="teamLeadName" name="teamLeadName">
                    </div>

                    <div class="form-group">
                        <label for="leadPhone">Team Lead Phone Number <span class="required">*</span></label>
                        <input type="tel" id="leadPhone" name="leadPhone">
                    </div>

                    <div class="form-group">
                        <label for="member2Name">Team Member 2 Name</label>
                        <input type="text" id="member2Name" name="member2Name">
                    </div>

                    <div class="form-group">
                        <label for="member2Phone">Team Member 2 Phone Number</label>
                        <input type="tel" id="member2Phone" name="member2Phone">
                    </div>

                    <div class="form-group">
                        <label for="member3Name">Team Member 3 Name</label>
                        <input type="text" id="member3Name" name="member3Name">
                    </div>

                    <div class="form-group">
                        <label for="member3Phone">Team Member 3 Phone Number</label>
                        <input type="tel" id="member3Phone" name="member3Phone">
                    </div>
                </div>

                <div class="form-group">
                    <label for="profSummit">Have you already registered for Profsummit? <span class="required">*</span></label>
                    <select id="profSummit" name="profSummit" required>
                        <option value="">Select an option</option>
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>

                <div class="profsummit-notice" id="profSummitNotice">
                    ⚠️ Please proceed to the next tab to register for Profsummit at 
                    <a href="https://profsummit.in" target="_blank">profsummit.in</a>
                </div>

                <button type="submit" class="submit-btn">🗝️ Begin Quest</button>
            </form>

            <div class="footer">
                © 2025 SSF Kerala Campus Syndicate
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        // Paste your Google Apps Script Web App URL here
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzS0obmVYjxzs6jR0XFEbzziQNuaBLBt-fP-5uAQbIK0TBd-PLg7L0ienm2Ke7IFGf2BQ/exec';
        // =========================

        const soloRadio = document.getElementById('solo');
        const teamRadio = document.getElementById('team');
        const soloSection = document.getElementById('soloSection');
        const teamSection = document.getElementById('teamSection');
        const profSummitSelect = document.getElementById('profSummit');
        const profSummitNotice = document.getElementById('profSummitNotice');

        // Handle Solo/Team radio button changes
        soloRadio.addEventListener('change', function() {
            if (this.checked) {
                soloSection.classList.add('active');
                teamSection.classList.remove('active');
                
                // Make solo fields required
                document.getElementById('soloName').required = true;
                document.getElementById('soloPhone').required = true;
                
                // Remove team required fields
                document.getElementById('teamLeadName').required = false;
                document.getElementById('leadPhone').required = false;
            }
        });

        teamRadio.addEventListener('change', function() {
            if (this.checked) {
                teamSection.classList.add('active');
                soloSection.classList.remove('active');
                
                // Make team fields required
                document.getElementById('teamLeadName').required = true;
                document.getElementById('leadPhone').required = true;
                
                // Remove solo required fields
                document.getElementById('soloName').required = false;
                document.getElementById('soloPhone').required = false;
            }
        });

        // Handle Profsummit dropdown
        profSummitSelect.addEventListener('change', function() {
            if (this.value === 'no') {
                profSummitNotice.classList.add('active');
            } else {
                profSummitNotice.classList.remove('active');
            }
        });

        // Handle form submission
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const participationType = document.querySelector('input[name="participationType"]:checked').value;
            
            let formData = {
                college: document.getElementById('college').value,
                participationType: participationType,
                profSummit: document.getElementById('profSummit').value,
                timestamp: new Date().toLocaleString()
            };

            // Add solo or team data based on selection
            if (participationType === 'solo') {
                formData.soloName = document.getElementById('soloName').value;
                formData.soloPhone = document.getElementById('soloPhone').value;
            } else {
                formData.teamLeadName = document.getElementById('teamLeadName').value;
                formData.leadPhone = document.getElementById('leadPhone').value;
                formData.member2Name = document.getElementById('member2Name').value;
                formData.member2Phone = document.getElementById('member2Phone').value;
                formData.member3Name = document.getElementById('member3Name').value;
                formData.member3Phone = document.getElementById('member3Phone').value;
            }

            if (SCRIPT_URL && SCRIPT_URL !== 'YOUR_SCRIPT_URL_HERE') {
                // Send to Google Apps Script
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                })
                .then(() => {
                    alert('🎉 Registration Successful! Your quest begins now, treasure hunter!');
                    this.reset();
                    soloSection.classList.remove('active');
                    teamSection.classList.remove('active');
                    profSummitNotice.classList.remove('active');
                })
                .catch((error) => {
                    console.error('Error:', error);
                    alert('✅ Data sent! Your quest begins now, treasure hunter!');
                    this.reset();
                    soloSection.classList.remove('active');
                    teamSection.classList.remove('active');
                    profSummitNotice.classList.remove('active');
                });
            } else {
                console.log('Registration Data:', formData);
                alert('⚠️ Please configure SCRIPT_URL in the JavaScript code. For now, data is logged to console.');
            }
        });
    </script>
</body>
</html>
