<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operation Cypher - Treasure Hunt Registration</title>
  <style>
    /* --- Base styles --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Courier New", monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .treasure-coin {
      position: fixed;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #ffd700 0%, #ffed4e 50%, #d4af37 100%);
      border-radius: 50%;
      border: 3px solid #b8860b;
      animation: float 4s ease-in-out infinite;
      z-index: 1;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .treasure-coin:nth-child(1) {
      top: 15%;
      left: 10%;
      animation-delay: 0s;
    }

    .treasure-coin:nth-child(2) {
      top: 60%;
      right: 15%;
      animation-delay: 1s;
    }

    .compass {
      position: fixed;
      width: 60px;
      height: 60px;
      top: 25%;
      right: 8%;
      animation: rotate 8s linear infinite;
      z-index: 1;
      filter: drop-shadow(0 0 15px rgba(255, 99, 71, 0.6));
    }

    .map-scroll {
      position: fixed;
      width: 70px;
      height: 50px;
      bottom: 20%;
      left: 8%;
      animation: bounce 3s ease-in-out infinite;
      z-index: 1;
      filter: drop-shadow(0 0 10px rgba(222, 184, 135, 0.5));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-15px) scale(1.1); }
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      position: relative;
      z-index: 10;
      padding: 20px;
    }

    .form-wrapper {
      background: rgba(20, 25, 45, 0.95);
      border: 3px solid #d4af37;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.3),
        inset 0 0 60px rgba(0, 0, 0, 0.5);
      position: relative;
      backdrop-filter: blur(10px);
      transition: filter 0.3s ease;
    }

    .form-wrapper.blurred {
      filter: blur(4px);
      pointer-events: none;
    }

    .form-wrapper::before {
      content: "";
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      background: linear-gradient(45deg, #d4af37, #ffd700, #d4af37);
      border-radius: 15px;
      z-index: -1;
      opacity: 0.3;
      animation: glow 10s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5em;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
        0 0 20px rgba(255, 215, 0, 0.5);
      margin-bottom: 10px;
      letter-spacing: 3px;
    }

    .header h2 {
      font-size: 1.3em;
      color: #fff;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
      margin-bottom: 10px;
    }

    .header p {
      color: #a0aec0;
      font-size: 1em;
      font-style: italic;
    }

    label {
      display: block;
      color: #ffd700;
      margin-bottom: 8px;
      font-size: 1.1em;
      text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
    }

    input, select {
      width: 100%;
      padding: 12px;
      background: rgba(10, 14, 39, 0.7);
      border: 2px solid #4a5568;
      border-radius: 8px;
      color: #fff;
      font-size: 1em;
      transition: all 0.3s;
      font-family: "Courier New", monospace;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #d4af37 0%, #ffd700 50%, #d4af37 100%);
      border: none;
      border-radius: 10px;
      color: #0a0e27;
      font-size: 1.3em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
      font-family: "Courier New", monospace;
      position: relative;
    }

    .submit-btn.loading {
      color: #0a0e27;
      pointer-events: none;
      opacity: 0.8;
    }

    .submit-btn.loading::after {
      content: "";
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      border: 3px solid #0a0e27;
      border-top: 3px solid transparent;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: translateY(-50%) rotate(360deg); }
    }

    /* Success overlay */
    .success-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(10, 14, 39, 0.8);
      border-radius: 15px;
      z-index: 100;
      flex-direction: column;
      color: #ffd700;
      text-align: center;
      padding: 40px;
      backdrop-filter: blur(8px);
      display: none;
    }

    .success-overlay.active {
      display: flex;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5em;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      padding: 20px;
      color: #d4af37;
      font-size: 0.9em;
      border-top: 2px solid rgba(212, 175, 55, 0.3);
    }
  </style>
</head>
<body>
  <div class="treasure-coin"></div>
  <div class="treasure-coin"></div>

  <svg class="compass" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#8b4513" stroke="#d4af37" stroke-width="3" />
    <circle cx="50" cy="50" r="35" fill="#2c1810" stroke="#d4af37" stroke-width="2" />
    <polygon points="50,15 55,48 50,50 45,48" fill="#ff6347" />
    <polygon points="50,85 55,52 50,50 45,52" fill="#fff" />
    <text x="50" y="25" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">N</text>
  </svg>

  <svg class="map-scroll" viewBox="0 0 100 100">
    <rect x="10" y="20" width="80" height="60" fill="#deb887" rx="5" />
    <line x1="20" y1="35" x2="80" y2="35" stroke="#8b4513" stroke-width="2" />
    <line x1="20" y1="45" x2="80" y2="45" stroke="#8b4513" stroke-width="2" />
    <line x1="20" y1="55" x2="60" y2="55" stroke="#8b4513" stroke-width="2" />
    <circle cx="70" cy="60" r="8" fill="none" stroke="#ff6347" stroke-width="3" />
    <line x1="64" y1="54" x2="76" y2="66" stroke="#ff6347" stroke-width="3" />
  </svg>

  <div class="container">
    <div class="form-wrapper" id="formWrapper">
      <div class="success-overlay" id="successOverlay">
        <button class="close-btn" id="closeOverlay">&times;</button>
        <h2>🎉 Registration Successful!</h2>
        <p>Your quest begins now, brave treasure hunter!</p>
      </div>

      <div class="header">
        <h1>OPERATION CYPHER ⚔️</h1>
        <h2>State Level Treasure Hunt</h2>
        <p>Solve clues and uncover secrets across the venue</p>
      </div>

      <form id="registrationForm">
        <div class="form-group">
          <label for="college">College <span class="required">*</span></label>
          <input type="text" id="college" name="college" required />
        </div>

        <div class="form-group">
          <label for="teamLeadName">Team Lead Name <span class="required">*</span></label>
          <input type="text" id="teamLeadName" name="teamLeadName" required />
        </div>

        <div class="form-group">
          <label for="leadPhone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="leadPhone" name="leadPhone" required />
        </div>

        <div class="form-group">
          <label for="member2Phone">Team Member 2 Phone Number</label>
          <input type="tel" id="member2Phone" name="member2Phone" />
        </div>

        <div class="form-group">
          <label for="member3Phone">Team Member 3 Phone Number</label>
          <input type="tel" id="member3Phone" name="member3Phone" />
        </div>

        <div class="form-group">
          <label for="profSummit">Have you already registered for Profsummit? <span class="required">*</span></label>
          <select id="profSummit" name="profSummit" required>
            <option value="">Select an option</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>

        <div class="profsummit-notice" id="profSummitNotice">
          ⚠️ Please proceed to the next tab to register for Profsummit at
          <a href="https://profsummit.in" target="_blank">profsummit.in</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">🗝️ Begin Quest</button>
      </form>

      <div class="footer">
        © 2025 SSF Kerala Campus Syndicate
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "YOUR_SCRIPT_URL_HERE";
    const form = document.getElementById("registrationForm");
    const formWrapper = document.getElementById("formWrapper");
    const successOverlay = document.getElementById("successOverlay");
    const closeOverlay = document.getElementById("closeOverlay");
    const submitBtn = document.getElementById("submitBtn");
    const profSummitSelect = document.getElementById("profSummit");
    const profSummitNotice = document.getElementById("profSummitNotice");

    profSummitSelect.addEventListener("change", () => {
      if (profSummitSelect.value === "no") {
        profSummitNotice.classList.add("active");
      } else {
        profSummitNotice.classList.remove("active");
      }
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      submitBtn.classList.add("loading");

      const formData = {
        college: form.college.value,
        teamLeadName: form.teamLeadName.value,
        leadPhone: form.leadPhone.value,
        member2Phone: form.member2Phone.value,
        member3Phone: form.member3Phone.value,
        profSummit: form.profSummit.value,
        timestamp: new Date().toLocaleString(),
      };

      if (SCRIPT_URL !== "YOUR_SCRIPT_URL_HERE") {
        fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(formData),
        })
          .then(() => showSuccess())
          .catch(() => showSuccess());
      } else {
        console.log("Registration Data:", formData);
        showSuccess();
      }
    });

    function showSuccess() {
      submitBtn.classList.remove("loading");
      formWrapper.classList.add("blurred");
      successOverlay.classList.add("active");
      form.reset();
      profSummitNotice.classList.remove("active");
    }

    closeOverlay.addEventListener("click", () => {
      successOverlay.classList.remove("active");
      formWrapper.classList.remove("blurred");
    });
  </script>
</body>
</html>
