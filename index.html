
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .reg-wrap {
    background: linear-gradient(160deg, #1a5c2a 0%, #0f3d1a 50%, #0a2910 100%);
    min-height: 600px;
    padding: 0 0 40px;
    font-family: 'Amiri', Georgia, serif;
    position: relative;
    overflow: hidden;
    border-radius: 16px;
  }
  .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
  .star { position: absolute; background: rgba(255,215,0,0.7); border-radius: 50%; animation: twinkle 3s infinite ease-in-out; }
  @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.9; transform: scale(1.4); } }
  .crescent { position: absolute; top: 16px; right: 24px; width: 60px; height: 60px; opacity: 0.25; animation: rotateSlow 20s linear infinite; }
  @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .header { text-align: center; padding: 36px 20px 20px; position: relative; }
  .badge { display: inline-block; background: rgba(212,175,55,0.18); border: 1px solid rgba(212,175,55,0.5); color: #f5d06a; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 16px; border-radius: 20px; margin-bottom: 10px; font-family: Georgia, serif; }
  .event-title { font-family: 'Noto Kufi Arabic', 'Amiri', serif; font-size: 36px; font-weight: 700; color: #f5d06a; line-height: 1.1; animation: glowPulse 3s ease-in-out infinite; letter-spacing: 1px; }
  @keyframes glowPulse { 0%, 100% { text-shadow: 0 0 20px rgba(245,208,106,0.2); } 50% { text-shadow: 0 0 40px rgba(245,208,106,0.5), 0 0 60px rgba(245,208,106,0.2); } }
  .event-sub { color: #a8d5a2; font-size: 15px; margin-top: 6px; letter-spacing: 0.5px; font-family: Georgia, serif; }
  .event-info { display: flex; justify-content: center; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
  .event-info span { background: rgba(255,255,255,0.08); border: 0.5px solid rgba(212,175,55,0.3); color: #e8c96a; font-size: 12px; padding: 5px 14px; border-radius: 20px; font-family: Georgia, serif; }
  .divider { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, #d4af37, transparent); margin: 18px auto; }
  .form-card { background: rgba(255,255,255,0.06); backdrop-filter: blur(8px); border: 0.5px solid rgba(212,175,55,0.25); border-radius: 16px; margin: 0 24px; padding: 28px 28px 24px; }
  .form-row { margin-bottom: 16px; }
  .form-label { display: block; color: #c9e6c4; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-family: Georgia, serif; }
  .form-input, .form-select { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(212,175,55,0.2); border-radius: 10px; color: #f0ede3; font-size: 14px; font-family: 'Amiri', Georgia, serif; outline: none; transition: border-color 0.3s, background 0.3s; -webkit-appearance: none; }
  .form-input::placeholder { color: rgba(200,190,160,0.45); }
  .form-input:focus, .form-select:focus { border-color: rgba(212,175,55,0.7); background: rgba(255,255,255,0.11); }
  .form-select option { background: #1a5c2a; color: #f0ede3; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #d4af37 0%, #a8860a 100%); border: none; border-radius: 12px; color: #1a0e00; font-size: 16px; font-weight: 700; font-family: 'Amiri', Georgia, serif; cursor: pointer; margin-top: 8px; letter-spacing: 1px; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(212,175,55,0.35); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn::before { content: ''; position: absolute; top: -50%; left: -60%; width: 40%; height: 200%; background: rgba(255,255,255,0.25); transform: skewX(-20deg); animation: shimmer 3s infinite; }
  @keyframes shimmer { 0% { left: -60%; } 60%, 100% { left: 130%; } }
  .prizes { display: flex; justify-content: center; gap: 10px; margin: 0 24px 20px; flex-wrap: wrap; }
  .prize-pill { background: rgba(212,175,55,0.12); border: 0.5px solid rgba(212,175,55,0.35); border-radius: 20px; padding: 6px 16px; color: #e8c96a; font-size: 12px; font-family: Georgia, serif; display: flex; align-items: center; gap: 6px; }
  .prize-dot { width: 8px; height: 8px; border-radius: 50%; background: #d4af37; flex-shrink: 0; }
  .prize-dot.s { background: #b0b0b0; }
  .prize-dot.b { background: #cd7f32; }
  .success-msg { display: none; text-align: center; padding: 30px 20px; color: #a8d5a2; font-family: 'Amiri', Georgia, serif; }
  .success-msg .check { font-size: 48px; color: #f5d06a; display: block; margin-bottom: 12px; }
  .success-msg p { font-size: 18px; color: #e8c96a; margin-bottom: 8px; font-weight: 700; }
  .success-msg span { font-size: 13px; color: #a8d5a2; }
  .ssf-tag { text-align: center; color: rgba(200,230,195,0.35); font-size: 11px; margin-top: 14px; letter-spacing: 1.5px; text-transform: uppercase; font-family: Georgia, serif; }
</style>

<div class="reg-wrap">
  <div class="stars" id="stars"></div>

  <svg class="crescent" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="40" fill="#d4af37"/>
    <circle cx="65" cy="40" r="33" fill="#0f3d1a"/>
  </svg>

  <div class="header">
    <div class="badge">Campus Syndicate · SSF Kerala</div>
    <div class="event-title">تَرْتِيل</div>
    <div style="color:#f5d06a;font-size:13px;margin-top:2px;font-family:Georgia,serif;letter-spacing:2px;">THARTHEEL</div>
    <div class="event-sub">Holy Quran Premio — Grand Quran Quiz</div>
    <div class="event-info">
      <span>28 April 2026</span>
      <span>9:00 PM</span>
      <span>Open for All College Students</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="prizes">
    <div class="prize-pill"><div class="prize-dot"></div>1st — ₹5000 Books</div>
    <div class="prize-pill"><div class="prize-dot s"></div>2nd — ₹3000 Books</div>
    <div class="prize-pill"><div class="prize-dot b"></div>3rd — ₹2000 Books</div>
  </div>

  <div class="form-card" id="formCard">
    <form id="regForm" onsubmit="handleSubmit(event)">
      <div class="form-row">
        <label class="form-label">Full Name</label>
        <input class="form-input" type="text" placeholder="Enter your full name" required id="fname"/>
      </div>
      <div class="form-row">
        <label class="form-label">College</label>
        <input class="form-input" type="text" placeholder="Name of your college" required id="college"/>
      </div>
      <div class="form-row">
        <label class="form-label">Course</label>
        <input class="form-input" type="text" placeholder="e.g. B.Sc Computer Science" required id="course"/>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label class="form-label">Year</label>
          <select class="form-select" required id="year">
            <option value="" disabled selected>Select year</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
            <option>PG 1st Year</option>
            <option>PG 2nd Year</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">District</label>
          <select class="form-select" required id="district">
            <option value="" disabled selected>Select district</option>
            <option>Thiruvananthapuram</option>
            <option>Kollam</option>
            <option>Pathanamthitta</option>
            <option>Alappuzha</option>
            <option>Kottayam</option>
            <option>Idukki</option>
            <option>Ernakulam</option>
            <option>Thrissur</option>
            <option>Palakkad</option>
            <option>Malappuram East</option>
            <option>Malappuram West</option>
            <option>Kozhikode North</option>
            <option>Kozhikode South</option>
            <option>Wayanad</option>
            <option>Kannur</option>
            <option>Kasaragod</option>
            <option>Nilgiris</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Phone Number</label>
        <input class="form-input" type="tel" placeholder="+91 00000 00000" required id="phone" pattern="[0-9+\s\-]{7,15}"/>
      </div>
      <button type="submit" class="submit-btn">Register Now ✦</button>
    </form>

    <div class="success-msg" id="successMsg">
      <span class="check">✦</span>
      <p id="successName">Registration Successful!</p>
      <span>Jazakallah Khair. You are registered for Thartheel 2026.</span>
    </div>
  </div>

  <div class="ssf-tag">ssfkeralacampus</div>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 3 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    starsEl.appendChild(s);
  }
  function handleSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('fname').value.trim();
    document.getElementById('regForm').style.display = 'none';
    const sm = document.getElementById('successMsg');
    sm.style.display = 'block';
    document.getElementById('successName').textContent = `Ahlan, ${name}! Registration Successful.`;
  }
</script>
